<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SesliHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
:root{--bg:#0e0f14;--bg2:#161720;--bg3:#1e2030;--bg4:#252840;--accent:#7c6bff;--accent2:#5b4de0;--accent3:#a695ff;--green:#3dd68c;--red:#ff5c5c;--yellow:#ffcc44;--text:#e8e9f3;--text2:#9599b8;--text3:#5a5e7a;--border:rgba(255,255,255,0.07);--radius:12px;--shadow:0 8px 32px rgba(0,0,0,0.4)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh}

#loading{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity 0.5s,visibility 0.5s}
#loading.hide{opacity:0;visibility:hidden}
.loading-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:2.5rem;color:var(--accent);letter-spacing:-1px}
.loading-spinner{width:40px;height:40px;border:3px solid var(--bg3);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#auth-screen{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(circle at 50% 50%,rgba(124,107,255,0.1) 0%,transparent 100%)}
.auth-box{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:40px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.auth-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.auth-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;text-align:center;margin-bottom:30px;color:var(--text);letter-spacing:-1px}
.auth-logo span{color:var(--accent)}
.auth-tabs{display:flex;background:var(--bg);padding:4px;border-radius:12px;margin-bottom:30px}
.auth-tab{flex:1;padding:10px;text-align:center;cursor:pointer;border-radius:8px;font-weight:600;font-size:0.9rem;transition:all 0.2s;color:var(--text2)}
.auth-tab.active{background:var(--bg3);color:var(--text)}
.auth-form{display:none}
.auth-form.active{display:block}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:0.85rem;font-weight:500;color:var(--text2);margin-bottom:8px;margin-left:4px}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px 18px;color:var(--text);font-family:inherit;font-size:1rem;transition:all 0.2s}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(124,107,255,0.1)}
.btn-primary{width:100%;background:var(--accent);color:white;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:'Syne',sans-serif}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(124,107,255,0.3)}
.auth-error{background:rgba(255,92,92,0.1);color:var(--red);padding:12px;border-radius:10px;font-size:0.85rem;margin-bottom:20px;display:none;border:1px solid rgba(255,92,92,0.2);text-align:center}

#app{display:flex;width:100%;height:100%;opacity:0;transition:opacity 0.5s}
#app:not(.hidden){opacity:1}
.hidden{display:none !important}

#sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10}
.sidebar-header{padding:24px;border-bottom:1px solid var(--border)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;color:var(--text);display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:1.2rem}
.sidebar-scroll{flex:1;overflow-y:auto;padding:10px}
.sidebar-scroll::-webkit-scrollbar{width:4px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

.nav-section{margin-bottom:24px}
.nav-title{font-size:0.75rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:0 14px 10px}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;transition:all 0.2s;color:var(--text2);margin-bottom:2px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent);color:white}
.nav-icon{font-size:1.2rem;width:24px;text-align:center}
.nav-label{font-size:0.95rem;font-weight:500}
.nav-badge{margin-left:auto;background:var(--red);color:white;font-size:0.7rem;font-weight:700;padding:2px 8px;border-radius:20px}

.user-panel{padding:16px;background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;gap:12px}
.user-avatar{width:42px;height:42px;border-radius:14px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.2rem;position:relative;border:1px solid var(--border)}
.status-indicator{position:absolute;bottom:-2px;right:-2px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bg);background:var(--green)}
.user-info{flex:1;min-width:0}
.user-name{font-size:0.9rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-status{font-size:0.75rem;color:var(--text3);font-weight:500}
.user-actions{display:flex;gap:4px}
.action-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;color:var(--text2);border:none;background:transparent}
.action-btn:hover{background:var(--bg3);color:var(--text)}
.action-btn.active{color:var(--red);background:rgba(255,92,92,0.1)}

#rooms-panel{width:320px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:all 0.3s}
.rooms-header{padding:24px;display:flex;align-items:center;justify-content:space-between}
.rooms-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.2rem}
.add-room-btn{width:36px;height:36px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.add-room-btn:hover{background:var(--accent);color:white;border-color:var(--accent)}

.room-list{flex:1;overflow-y:auto;padding:0 12px 20px}
.room-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all 0.2s;position:relative}
.room-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.room-card.active{border-color:var(--accent);background:rgba(124,107,255,0.03)}
.room-card.active::after{content:'';position:absolute;left:-12px;top:20%;bottom:20%;width:4px;background:var(--accent);border-radius:0 4px 4px 0}
.room-icon{width:44px;height:44px;border-radius:12px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:12px}
.room-name{font-size:1rem;font-weight:700;margin-bottom:4px}
.room-meta{display:flex;align-items:center;gap:12px;font-size:0.8rem;color:var(--text3);font-weight:500}
.room-stat{display:flex;align-items:center;gap:4px}

#main{flex:1;display:flex;flex-direction:column;background:var(--bg);position:relative}
#room-view{flex:1;display:flex;flex-direction:column;opacity:0;visibility:hidden;transition:all 0.3s}
#room-view.active{opacity:1;visibility:visible}

.room-header{height:80px;padding:0 30px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(14,15,20,0.8);backdrop-filter:blur(10px);z-index:5}
.room-header-name{font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;display:flex;align-items:center;gap:12px}
.room-header-right{display:flex;align-items:center;gap:12px}
.room-header-btn{padding:10px 18px;border-radius:12px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px}
.room-header-btn:hover{background:var(--bg4);border-color:var(--text3)}
.room-header-btn.primary{background:var(--accent);color:white;border:none}
.room-header-btn.primary:hover{background:var(--accent2)}
.room-header-btn.danger{background:rgba(255,92,92,0.1);color:var(--red);border-color:rgba(255,92,92,0.2)}
.room-header-btn.danger:hover{background:var(--red);color:white}

#voice-area{flex:1;padding:30px;overflow-y:auto;display:flex;flex-direction:column}
.participants-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px}
.participant-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:15px;position:relative;transition:all 0.3s;aspect-ratio:1/1.1;justify-content:center}
.participant-card.speaking{border-color:var(--green);box-shadow:0 0 20px rgba(61,214,140,0.15)}
.participant-card.speaking::before{content:'';position:absolute;inset:-2px;border:2px solid var(--green);border-radius:22px;animation:pulse 2s infinite}
@keyframes pulse{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.05)}}

.participant-avatar{width:100px;height:100px;border-radius:35px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:2.5rem;font-weight:800;border:2px solid var(--border);position:relative}
.participant-name{font-size:1.1rem;font-weight:700}
.participant-status-tags{display:flex;gap:6px}
.status-tag{padding:4px 10px;border-radius:8px;font-size:0.7rem;font-weight:700;text-transform:uppercase;display:flex;align-items:center;gap:4px}
.tag-mic{background:rgba(255,92,92,0.1);color:var(--red)}
.tag-deaf{background:rgba(149,153,184,0.1);color:var(--text2)}
.tag-screen{background:rgba(124,107,255,0.1);color:var(--accent)}

#chat-area{width:360px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;position:absolute;top:0;right:-360px;bottom:0;transition:right 0.3s ease-in-out;z-index:20;box-shadow:var(--shadow)}
#chat-area.active{right:0}
.chat-header{height:80px;padding:0 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2)}
.chat-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem}
.close-chat{cursor:pointer;font-size:1.2rem;color:var(--text3);transition:color 0.2s}
.close-chat:hover{color:var(--text)}

.chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.chat-msg{max-width:85%}
.chat-msg-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.chat-msg-user{font-size:0.85rem;font-weight:700;color:var(--accent)}
.chat-msg-time{font-size:0.7rem;color:var(--text3)}
.chat-msg-text{background:var(--bg3);padding:10px 14px;border-radius:0 14px 14px 14px;font-size:0.9rem;line-height:1.5;word-break:break-word}
.chat-msg.me{align-self:flex-end}
.chat-msg.me .chat-msg-header{flex-direction:row-reverse}
.chat-msg.me .chat-msg-text{background:var(--accent);color:white;border-radius:14px 0 14px 14px}
.chat-msg.system{align-self:center;max-width:100%}
.chat-msg.system .chat-msg-text{background:transparent;color:var(--text3);font-size:0.8rem;font-style:italic;text-align:center}

.chat-input-container{padding:20px;border-top:1px solid var(--border)}
.chat-input-wrapper{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:6px;display:flex;gap:6px}
.chat-input{flex:1;background:transparent;border:none;padding:10px 14px;color:var(--text);font-family:inherit;font-size:0.9rem}
.chat-input:focus{outline:none}
.send-btn{width:40px;height:40px;border-radius:10px;background:var(--accent);color:white;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.send-btn:hover{background:var(--accent2);transform:scale(1.05)}

.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{width:100%;max-width:460px;background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:34px;box-shadow:var(--shadow);position:relative}
.modal-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;margin-bottom:24px}
.modal-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:30px}
.btn-ghost{background:transparent;border:none;color:var(--text2);padding:12px 24px;font-weight:600;cursor:pointer;border-radius:12px;transition:all 0.2s}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}

#toasts{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:10px;align-items:center}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;font-size:0.9rem;font-weight:600;animation:toastIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);min-width:200px}
@keyframes toastIn{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.toast.success{border-left:4px solid var(--green)}
.toast.error{border-left:4px solid var(--red)}
.toast-icon{font-size:1.2rem}

.ptt-key-btn{background:var(--bg3); border:1px solid var(--accent); color:var(--text); padding:10px; border-radius:10px; cursor:pointer; width:100%; font-family:'Syne',sans-serif; transition:all 0.2s;}
.ptt-key-btn:hover{background:var(--accent); color:white;}
.ptt-active-border{border:2px solid var(--green) !important; box-shadow: 0 0 15px var(--green) !important;}

@media (max-width:1024px){#sidebar{width:80px}.nav-label,.nav-title,.user-info,.user-actions,.logo-text{display:none}.sidebar-header{padding:15px;justify-content:center}.logo{justify-content:center}}
@media (max-width:768px){#rooms-panel{display:none}#chat-area{width:100%;right:-100%}}
</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">SesliHub</div>
  <div class="loading-spinner"></div>
</div>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">Sesli<span>Hub</span></div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="showAuth('login')">Giriş Yap</div>
      <div class="auth-tab" onclick="showAuth('register')">Kayıt Ol</div>
    </div>
    
    <div id="auth-error" class="auth-error"></div>

    <div id="login-form" class="auth-form active">
      <div class="form-group">
        <label class="form-label">Kullanıcı Adı</label>
        <input type="text" id="login-username" class="form-input" placeholder="Kullanıcı adınızı girin">
      </div>
      <div class="form-group">
        <label class="form-label">Şifre</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••">
      </div>
      <button onclick="handleLogin()" class="btn-primary">Giriş Yap</button>
    </div>

    <div id="register-form" class="auth-form">
      <div class="form-group">
        <label class="form-label">Kullanıcı Adı</label>
        <input type="text" id="reg-username" class="form-input" placeholder="En az 3 karakter">
      </div>
      <div class="form-group">
        <label class="form-label">Şifre</label>
        <input type="password" id="reg-password" class="form-input" placeholder="En az 6 karakter">
      </div>
      <button onclick="handleRegister()" class="btn-primary">Hesap Oluştur</button>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">🎙️</div>
        <span class="logo-text">SesliHub</span>
      </div>
    </div>
    <div class="sidebar-scroll">
      <div class="nav-section">
        <div class="nav-title">Menü</div>
        <div class="nav-item active" onclick="showView('rooms')">
          <div class="nav-icon">🏠</div>
          <div class="nav-label">Odalar</div>
        </div>
        <div class="nav-item">
          <div class="nav-icon">👥</div>
          <div class="nav-label">Arkadaşlar</div>
          <div class="nav-badge">2</div>
        </div>
        <div class="nav-item">
          <div class="nav-icon">📅</div>
          <div class="nav-label">Etkinlikler</div>
        </div>
      </div>
    </div>
    <div class="user-panel">
      <div class="user-avatar" id="my-avatar">?</div>
      <div class="user-info">
        <div class="user-name" id="my-username">Yükleniyor...</div>
        <div class="user-status">Çevrimiçi</div>
      </div>
      <div class="user-actions">
        <button class="action-btn" id="mic-toggle-btn" onclick="toggleMic()">🎤</button>
        <button class="action-btn" id="deafen-toggle-btn" onclick="toggleDeafen()">🎧</button>
        <button class="action-btn" onclick="openModal('settings-modal')">⚙️</button>
      </div>
    </div>
  </aside>

  <aside id="rooms-panel">
    <div class="rooms-header">
      <h2 class="rooms-title">Odalar</h2>
      <button class="add-room-btn" onclick="openModal('create-room-modal')">＋</button>
    </div>
    <div class="room-list" id="room-list">
      </div>
  </aside>

  <main id="main">
    <div id="room-view">
      <div class="room-header">
        <div id="active-room-name" class="room-header-name">Lobi</div>
        <div class="room-header-right">
          <button class="room-header-btn" id="screen-btn" onclick="toggleScreenShare()">📺 Ekran Paylaş</button>
          <button class="room-header-btn" onclick="toggleChat()">💬 Sohbet</button>
          <button class="room-header-btn danger" onclick="leaveRoom()">🚪 Ayrıl</button>
        </div>
      </div>
      <div id="voice-area">
        <div class="participants-grid" id="participants-container">
          </div>
      </div>
    </div>

    <div id="chat-area">
      <div class="chat-header">
        <h3 class="chat-title">Oda Sohbeti</h3>
        <div class="close-chat" onclick="toggleChat()">✕</div>
      </div>
      <div class="chat-messages" id="chat-messages">
        </div>
      <div class="chat-input-container">
        <form class="chat-input-wrapper" onsubmit="handleSendMessage(event)">
          <input type="text" id="chat-input" class="chat-input" placeholder="Mesajınızı yazın..." autocomplete="off">
          <button type="submit" class="send-btn">🚀</button>
        </form>
      </div>
    </div>
  </main>
</div>

<div id="create-room-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3 class="modal-title">Yeni Oda Oluştur</h3>
    <div class="form-group">
      <label class="form-label">Oda Adı</label>
      <input type="text" id="new-room-name" class="form-input" placeholder="Örn: Oyun Odası">
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('create-room-modal')">Vazgeç</button>
      <button class="btn-primary" onclick="handleCreateRoom()" style="width:auto; padding:12px 30px">Oluştur</button>
    </div>
  </div>
</div>

<div id="settings-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3 class="modal-title">⚙️ Ayarlar</h3>
    <div class="form-group">
      <label class="form-label">Konuşma Tuşu (Bas-Konuş)</label>
      <button id="ptt-key-display" onclick="startPTTKeyCapture()" class="ptt-key-btn">Tuş Ata: (V)</button>
      <p style="font-size:11px; color:var(--text3); margin-top:5px;">Tuşu değiştirmek için tıklayın ve yeni tuşa basın.</p>
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="closeModal('settings-modal')">Kapat</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
// ══════════════════════════════════════════════════════════════
// DEĞİŞKENLER VE SOCKET
// ══════════════════════════════════════════════════════════════
const socket = io({
  transports: ['websocket', 'polling'],
  reconnectionAttempts: 5
});

let currentUser = null;
let currentRoom = null;
let localStream = null;
let screenStream = null;
let isMicMuted = true;
let isDeafened = false;
let isPushing = false;
let boundPTTKey = localStorage.getItem('pttKey') || 'v';

// RTC Nesneleri
const peers = {}; 
const screenPeers = {};

// ══════════════════════════════════════════════════════════════
// BAŞLANGIÇ
// ══════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loading').classList.add('hide');
    checkAuth();
  }, 1000);
  
  // PTT Tuşunu Ekrana Yaz
  document.getElementById('ptt-key-display').innerText = `Tuş Ata: (${boundPTTKey.toUpperCase()})`;
});

async function checkAuth() {
  const token = localStorage.getItem('token');
  if (token) {
    const res = await api('/api/me');
    if (res.success) {
      currentUser = res.user;
      initApp();
    } else {
      localStorage.removeItem('token');
      showAuthScreen();
    }
  } else {
    showAuthScreen();
  }
}

function initApp() {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  
  document.getElementById('my-username').innerText = currentUser.username;
  document.getElementById('my-avatar').innerText = currentUser.username[0].toUpperCase();
  
  loadRooms();
  initMedia();
}

async function initMedia() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    // Başlangıçta mikrofon kapalı (PTT mantığı)
    localStream.getAudioTracks()[0].enabled = false;
    updateMicUI();
  } catch (err) {
    console.error("Medya hatası:", err);
    toast("Mikrofon erişimi engellendi!", "error");
  }
}

// ══════════════════════════════════════════════════════════════
// PTT (BAS-KONUŞ) DİNAMİK SİSTEMİ
// ══════════════════════════════════════════════════════════════
function startPTTKeyCapture() {
    const btn = document.getElementById('ptt-key-display');
    btn.innerText = "Bir tuşa basın...";
    const handler = (e) => {
        e.preventDefault();
        boundPTTKey = e.key.toLowerCase();
        localStorage.setItem('pttKey', boundPTTKey);
        btn.innerText = `Atandı: (${boundPTTKey.toUpperCase()})`;
        window.removeEventListener('keydown', handler, true);
    };
    window.addEventListener('keydown', handler, true);
}

window.addEventListener('keydown', (e) => {
    // Eğer chat inputu aktifse PTT çalışmasın
    if(document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;

    if (e.key.toLowerCase() === boundPTTKey && !isPushing && !isMicMuted) {
        isPushing = true;
        if (localStream && localStream.getAudioTracks()[0]) {
            localStream.getAudioTracks()[0].enabled = true;
        }
        socket.emit('user:speaking', true);
        const myCard = document.getElementById('participant-me');
        if(myCard) myCard.classList.add('speaking');
    }
});

window.addEventListener('keyup', (e) => {
    if (e.key.toLowerCase() === boundPTTKey) {
        isPushing = false;
        if (localStream && localStream.getAudioTracks()[0]) {
            localStream.getAudioTracks()[0].enabled = false;
        }
        socket.emit('user:speaking', false);
        const myCard = document.getElementById('participant-me');
        if(myCard) myCard.classList.remove('speaking');
    }
});

// ══════════════════════════════════════════════════════════════
// EKRAN PAYLAŞIMI (SIYAH EKRAN FIX)
// ══════════════════════════════════════════════════════════════
async function toggleScreenShare() {
    try {
        if (!screenStream) {
            screenStream = await navigator.mediaDevices.getDisplayMedia({
                video: { cursor: "always" },
                audio: true
            });
            
            screenStream.getVideoTracks()[0].onended = () => stopScreenShare();
            
            // UI Güncelle
            document.getElementById('screen-btn').innerText = "🛑 Paylaşımı Durdur";
            document.getElementById('screen-btn').classList.add('danger');
            
            // Socket ile bildir
            socket.emit('user:screen_share_start');
            
            // Kendi ekranımızı localde göster
            addVideoStream('me-screen', screenStream, true);
            
            // Mevcut odadaki herkese stream gönder (RTC)
            Object.keys(peers).forEach(id => {
                // Burada screenPeer mantığı çalışır (server-side desteğine göre)
                // Orijinal yapındaki RTC akışını buraya bağlayabilirsin
            });

        } else {
            stopScreenShare();
        }
    } catch (err) {
        console.error("Ekran paylaşımı başlatılamadı:", err);
    }
}

function stopScreenShare() {
    if (screenStream) {
        screenStream.getTracks().forEach(track => track.stop());
        screenStream = null;
    }
    socket.emit('user:screen_share_stop');
    const el = document.getElementById('me-screen');
    if (el) el.remove();
    
    document.getElementById('screen-btn').innerText = "📺 Ekran Paylaş";
    document.getElementById('screen-btn').classList.remove('danger');
}

function addVideoStream(id, stream, isLocal = false) {
    const container = document.getElementById('participants-container');
    let video = document.getElementById(id);
    if (!video) {
        video = document.createElement('video');
        video.id = id;
        video.className = "participant-card"; // Tasarıma uyum sağlasın
        video.style.objectFit = "cover";
        container.appendChild(video);
    }
    // SİYAH EKRAN ÇÖZÜMÜ:
    video.autoplay = true;
    video.playsInline = true;
    video.muted = isLocal;
    video.srcObject = stream;
    
    video.onloadedmetadata = () => {
        video.play().catch(e => console.warn("Video play error:", e));
    };
}

// ══════════════════════════════════════════════════════════════
// AUTH İŞLEMLERİ (FULL)
// ══════════════════════════════════════════════════════════════
function showAuth(type) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(type + '-form').classList.add('active');
}

async function handleLogin() {
  const u = document.getElementById('login-username').value;
  const p = document.getElementById('login-password').value;
  const err = document.getElementById('auth-error');
  
  if(!u || !p) {
    err.innerText = "Lütfen tüm alanları doldurun.";
    err.style.display = 'block';
    return;
  }

  const res = await api('/api/login', 'POST', { username: u, password: p });
  if (res.success) {
    localStorage.setItem('token', res.token);
    currentUser = res.user;
    initApp();
    toast("Hoş geldin, " + u, "success");
  } else {
    err.innerText = res.message;
    err.style.display = 'block';
  }
}

async function handleRegister() {
  const u = document.getElementById('reg-username').value;
  const p = document.getElementById('reg-password').value;
  const err = document.getElementById('auth-error');

  if(u.length < 3 || p.length < 6) {
    err.innerText = "Kullanıcı adı min 3, şifre min 6 karakter olmalıdır.";
    err.style.display = 'block';
    return;
  }

  const res = await api('/api/register', 'POST', { username: u, password: p });
  if (res.success) {
    showAuth('login');
    document.querySelector('.auth-tab:first-child').click();
    toast("Hesap oluşturuldu, giriş yapabilirsiniz.", "success");
  } else {
    err.innerText = res.message;
    err.style.display = 'block';
  }
}

// ══════════════════════════════════════════════════════════════
// ODA VE UI YÖNETİMİ (FULL)
// ══════════════════════════════════════════════════════════════
async function loadRooms() {
  const res = await api('/api/rooms');
  if (res.success) {
    const list = document.getElementById('room-list');
    list.innerHTML = '';
    res.rooms.forEach(room => {
      const el = document.createElement('div');
      el.className = 'room-card' + (currentRoom?.id === room.id ? ' active' : '');
      el.onclick = () => joinRoom(room);
      el.innerHTML = `
        <div class="room-icon">${room.icon || '💬'}</div>
        <div class="room-name">${room.name}</div>
        <div class="room-meta">
          <div class="room-stat">👤 ${room.userCount || 0}</div>
        </div>
      `;
      list.appendChild(el);
    });
  }
}

async function handleCreateRoom() {
  const name = document.getElementById('new-room-name').value;
  if (!name) return;
  const res = await api('/api/rooms', 'POST', { name });
  if (res.success) {
    closeModal('create-room-modal');
    loadRooms();
    toast("Oda oluşturuldu", "success");
  }
}

function joinRoom(room) {
  if (currentRoom?.id === room.id) return;
  if (currentRoom) leaveRoom();

  currentRoom = room;
  document.getElementById('room-view').classList.add('active');
  document.getElementById('active-room-name').innerText = room.name;
  
  socket.emit('room:join', { roomId: room.id });
  loadRooms(); // Listeyi güncelle
  addSystemMessage(`${room.name} odasına katıldınız.`);
}

function leaveRoom() {
  if (!currentRoom) return;
  socket.emit('room:leave');
  currentRoom = null;
  document.getElementById('room-view').classList.remove('active');
  document.getElementById('participants-container').innerHTML = '';
  document.getElementById('chat-messages').innerHTML = '';
  loadRooms();
}

function toggleMic() {
  isMicMuted = !isMicMuted;
  updateMicUI();
  socket.emit('user:mic_toggle', isMicMuted);
}

function updateMicUI() {
  const btn = document.getElementById('mic-toggle-btn');
  btn.innerText = isMicMuted ? '🔇' : '🎤';
  btn.classList.toggle('active', isMicMuted);
}

function toggleDeafen() {
  isDeafened = !isDeafened;
  const btn = document.getElementById('deafen-toggle-btn');
  btn.innerText = isDeafened ? '❌🎧' : '🎧';
  btn.classList.toggle('active', isDeafened);
  socket.emit('user:deafen_toggle', isDeafened);
}

function toggleChat() {
  document.getElementById('chat-area').classList.toggle('active');
}

// ══════════════════════════════════════════════════════════════
// MESAJLAŞMA
// ══════════════════════════════════════════════════════════════
function handleSendMessage(e) {
  e.preventDefault();
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg || !currentRoom) return;

  socket.emit('chat:message', { roomId: currentRoom.id, content: msg });
  input.value = '';
}

socket.on('chat:message', (msg) => {
  appendChatMessage(msg);
});

function appendChatMessage(msg) {
  const el = document.getElementById('chat-messages');
  const d = document.createElement('div');
  const isMe = msg.userId === currentUser.id;
  
  if (msg.system) {
    d.className = 'chat-msg system';
    d.innerHTML = `<div class="chat-msg-text">${msg.content}</div>`;
  } else {
    d.className = 'chat-msg' + (isMe ? ' me' : '');
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    d.innerHTML = `
      <div class="chat-msg-header">
        <span class="chat-msg-user">${isMe ? 'Siz' : msg.username}</span>
        <span class="chat-msg-time">${time}</span>
      </div>
      <div class="chat-msg-text">${msg.content}</div>
    `;
  }
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}

// ══════════════════════════════════════════════════════════════
// SOCKET OLAYLARI VE KATILIMCILAR
// ══════════════════════════════════════════════════════════════
socket.on('room:users', (users) => {
  const container = document.getElementById('participants-container');
  container.innerHTML = '';
  
  users.forEach(user => {
    const isMe = user.id === currentUser.id;
    const card = document.createElement('div');
    card.className = 'participant-card' + (user.speaking ? ' speaking' : '');
    card.id = isMe ? 'participant-me' : 'participant-' + user.id;
    
    card.innerHTML = `
      <div class="participant-avatar">${user.username[0].toUpperCase()}</div>
      <div class="participant-name">${user.username} ${isMe ? '(Siz)' : ''}</div>
      <div class="participant-status-tags">
        ${user.micMuted ? '<span class="status-tag tag-mic">Sessiz</span>' : ''}
        ${user.deafened ? '<span class="status-tag tag-deaf">Sağır</span>' : ''}
        ${user.sharingScreen ? '<span class="status-tag tag-screen">Ekran</span>' : ''}
      </div>
    `;
    container.appendChild(card);
  });
});

// ══════════════════════════════════════════════════════════════
// YARDIMCILAR
// ══════════════════════════════════════════════════════════════
async function api(url, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  const t = localStorage.getItem('token');
  if (t) opts.headers['Authorization'] = 'Bearer ' + t;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  return r.json();
}

function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = `<span class="toast-icon">${type==='success'?'✅':'ℹ️'}</span> ${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function addSystemMessage(text) { appendChatMessage({ system: true, content: text }); }
</script>
